function getDday() {
  const now = new Date();
  const kstNow = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  const nowDate = new Date(kstNow.getFullYear(), kstNow.getMonth(), kstNow.getDate());
  const openDate = new Date(2026, 2, 28); // 3??28???띠룇裕녶퐲?
  const postseasonDate = new Date(2026, 7, 20); // 8??20???띠럾??熬곣뫖???  // 8/20 ??袁⑸쐩嶺??띠럾??熬곣뫖???  if (nowDate >= postseasonDate) return 'POSTSEASON';
  const diff = Math.round((openDate - nowDate) / (1000*60*60*24));
  if (diff > 0) return `D-${diff}`;
  if (diff === 0) return 'D-Day';
  return `D+${Math.abs(diff)}`;
}

const normalizePositionLabel = pos => {
  const map = {
    '\uC911\uACAC\uC218':'CF','\uC88C\uC775\uC218':'LF','\uC6B0\uC775\uC218':'RF','\uC720\uACA9\uC218':'SS',

    CF:'CF', LF:'LF', RF:'RF', SS:'SS', '2B':'2B', '1B':'1B', '3B':'3B', C:'C', P:'P', DH:'DH'

  return map[pos] || pos || '';

const normalizeLineupPlayer = (player, idx, starterNameFallback='') => {
  const starterName = player.starterName || starterNameFallback || player.name || '';

  const starterPos = normalizePositionLabel(player.starterPos || player.pos || player.p || '');
  const currentPos = normalizePositionLabel(player.pos || player.p || starterPos);
  const displayPos = starterPos || currentPos;
  return {
    n: player.order || player.n || idx + 1,
    name: currentName,
    p: displayPos,
    pos: displayPos,
    sub: starterName && starterName !== currentName ? starterName : (player.sub || null),
    starterName,
  };
};

async function fetchLineupDirect(gameId, inning) {
  if (!gameId) return null;
  const inn = Math.max(1, inning || 1);
  try {
    const urls = [
      `https://api-gw.sports.naver.com/schedule/games/${gameId}/lineup`,
      `https://api-gw.sports.naver.com/game/${gameId}/lineup`,
      `https://api-gw.sports.naver.com/schedule/games/${gameId}/game-polling?inning=${inn}&isHighlight=false`,
    ];
    let result = null;
    for (const url of urls) {
      try {
        const r = await fetch(url, { headers: { Accept: 'application/json' } });
        if (!r.ok) continue;
        const data = await r.json();
        result = data?.result || null;
        if (result) break;
      } catch(e) {}
    }
    if (!result) return null;
    const td = result.textRelayData || result;
    const homeL = td.homeLineup || result.homeLineup;
    const awayL = td.awayLineup || result.awayLineup;
    const gs = td.currentGameState || result.currentGameState;

    const parseBatters = (arr) => {
      if (!arr?.length) return [];
      const om = {};
      arr.forEach(p => { if (!om[p.batOrder]) om[p.batOrder] = []; om[p.batOrder].push(p); });
      return Object.entries(om).sort(([a],[b])=>+a-+b).map(([o,ps]) => {
        const cur = ps.find(p=>p.cin==='true') || ps.find(p=>!p.cout) || ps[ps.length-1];
        const prev = ps.find(p=>p.cout==='true' && p!==cur);
        return { n:+o, order:+o, name:cur.name, p:cur.posName||'', pos:cur.posName||'', sub:prev?.name||null, hit:cur.hit||0, ab:cur.ab||0, rbi:cur.rbi||0 };
      });
    };
    const parsePitchers = (arr) => (arr||[]).map(p=>({ seqno:p.seqno, name:p.name, inn:p.inn||'0', er:p.er||0, kk:p.kk||0 }));

    if (!homeL && !awayL) return gs ? { currentGameState: gs } : null;

    return {
      home: { batters: parseBatters(homeL?.batter), pitchers: parsePitchers(homeL?.pitcher) },
      away: { batters: parseBatters(awayL?.batter), pitchers: parsePitchers(awayL?.pitcher) },
      currentGameState: gs || null,
    };
  } catch(e) { return null; }
}

  if (g && g.gameId) {

  let ty=null, txStart=0, canSwipeClose=false;
  box.ontouchstart=e=>{
    ty=e.touches[0].clientY;
    txStart=e.touches[0].clientX;
    canSwipeClose = (box.scrollTop <= 0);
  };
  box.ontouchmove=e=>{
    if(ty===null) return;
    const dy=e.touches[0].clientY-ty;
    const dx=Math.abs(e.touches[0].clientX-txStart);

  box.ontouchend=e=>{
    if(ty===null) return;
    const dy=e.changedTouches[0].clientY-ty;
    if(canSwipeClose && dy>60) closeModal();
    ty=null;
  };
}

function parseBrowserBatters(batters) {
  if (!batters?.length) return [];
  const orderMap = {};
  batters.forEach(p => {
    const order = p.batOrder;
    if (!orderMap[order]) orderMap[order] = [];
    orderMap[order].push(p);
  });
  return Object.entries(orderMap)
    .sort(([a], [b]) => Number(a) - Number(b))
    .map(([order, players]) => {
      const current = players.find(p => p.cin === 'true') || players.find(p => !p.cout) || players[players.length - 1];
      const prev = players.find(p => p.cout === 'true' && p !== current);
      return {
        n: Number(order),
        order: Number(order),
        name: current?.name || '',
        p: current?.posName || '',
        pos: current?.posName || '',
        sub: prev?.name || null,
        hit: current?.hit || 0,
        ab: current?.ab || 0,
        rbi: current?.rbi || 0,
      };
    });
}

function parseBrowserPitchers(pitchers) {
  return (pitchers || []).map(p => ({
    seqno: p.seqno,
    name: p.name,
    inn: p.inn || '0',
    er: p.er || 0,
    kk: p.kk || 0,
    bb: p.bb || 0,
  }));
}

function buildBrowserLineup(detail) {
  if (!detail) return null;
  const td = detail.textRelayData || detail;
  const home = td.homeLineup || detail.homeLineup;
  const away = td.awayLineup || detail.awayLineup;
  if (!home && !away) return null;
  return {
    home: {
      batters: parseBrowserBatters(home?.batter),
      pitchers: parseBrowserPitchers(home?.pitcher),
    },
    away: {
      batters: parseBrowserBatters(away?.batter),
      pitchers: parseBrowserPitchers(away?.pitcher),
    },
  };
}

function parseInningNumber(statusInfo) {
  const match = String(statusInfo || '').match(/(\d+)/);
  return match ? Number(match[1]) : null;
}

async function fetchBrowserGameDetail(gameId, inning) {
  if (!gameId) return null;
  const inn = Math.max(1, inning || 1);
  try {
    const r = await fetch(`https://api-gw.sports.naver.com/schedule/games/${gameId}/game-polling?inning=${inn}&isHighlight=false`, {
      headers: { Accept: 'application/json' }
    });
    if (!r.ok) return null;
    const data = await r.json();
    return data?.result || null;
  } catch(e) {
    return null;
  }
}

function convertBrowserGame(game, detail) {
  const gameData = detail?.game || game;
  const away = normalizeApiTeam(game.awayTeamCode, game.awayTeamName);
  const home = normalizeApiTeam(game.homeTeamCode, game.homeTeamName);
  const statusCode = game.statusCode || '';
  const status = statusCode === 'BEFORE' ? 'SCHEDULED' : statusCode === 'STARTED' ? 'LIVE' : statusCode === 'RESULT' ? 'FINAL' : 'SCHEDULED';
  const awayRaw = gameData.awayTeamScoreByInning || game.awayTeamScoreByInning || [];
  const homeRaw = gameData.homeTeamScoreByInning || game.homeTeamScoreByInning || [];
  const awayInnings = Array(9).fill(-1);
  const homeInnings = Array(9).fill(-1);
  awayRaw.forEach((score, index) => {
    if (index < 9 && score !== '-') awayInnings[index] = Number(score);
  });
  homeRaw.forEach((score, index) => {
    if (index < 9 && score !== '-') homeInnings[index] = Number(score);
  });

  return {
    date: game.gameDate || '',
    time: game.gameDateTime?.split('T')[1]?.slice(0, 5) || '',
    away,
    home,
    stad: game.stadium || gameData.stadium || '',
    status,
    awayScore: game.awayTeamScore != null ? Number(game.awayTeamScore) : null,
    homeScore: game.homeTeamScore != null ? Number(game.homeTeamScore) : null,
    awayInnings,
    homeInnings,
    inning: parseInningNumber(game.statusInfo),
    inningInfo: game.statusInfo || null,
    winPitcher: gameData.winPitcherName || game.winPitcherName || null,
    losePitcher: gameData.losePitcherName || game.losePitcherName || null,
    awayStarter: gameData.awayStarterName || game.awayStarterName || null,
    homeStarter: gameData.homeStarterName || game.homeStarterName || null,
    awayPitcher: gameData.awayCurrentPitcherName || game.awayCurrentPitcherName || null,
    homePitcher: gameData.homeCurrentPitcherName || game.homeCurrentPitcherName || null,
    lineup: buildBrowserLineup(detail),
    currentGameState: detail?.textRelayData?.currentGameState || detail?.currentGameState || null,
    broadChannel: game.broadChannel || null,
    gameId: String(game.gameId || ''),
  };
}

async function fetchTodayScoresDirect() {
  const now = new Date();
  const kst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  const yyyy = kst.getFullYear();
  const mm = String(kst.getMonth() + 1).padStart(2, '0');
  const dd = String(kst.getDate()).padStart(2, '0');
  const todayDash = `${yyyy}-${mm}-${dd}`;
  const url = `https://api-gw.sports.naver.com/schedule/games?fields=basic%2Cschedule%2Cbaseball%2CmanualRelayUrl&upperCategoryId=kbaseball&fromDate=${todayDash}&toDate=${todayDash}&size=500`;
  const r = await fetch(url, { headers: { Accept: 'application/json' } });
  if (!r.ok) throw new Error(`direct schedule ${r.status}`);
  const data = await r.json();
  const rawGames = (data?.result?.games || []).filter(g => g.categoryId === 'kbo');
  const detailMap = {};

  await Promise.all(rawGames.map(async game => {
    const shouldFetchDetail = game.statusCode === 'BEFORE' || game.statusCode === 'STARTED' || game.statusCode === 'RESULT';
    if (!shouldFetchDetail) return;
    const inning = game.statusCode === 'STARTED' ? (parseInningNumber(game.statusInfo) || 1) : 1;
    const detail = await fetchBrowserGameDetail(game.gameId, inning);
    if (detail) detailMap[game.gameId] = detail;
  }));

  return {
    games: rawGames.map(game => convertBrowserGame(game, detailMap[game.gameId] || null)),
  };
}

async function fetchScoresPayload() {
  const candidates = [];
  if (window.KBO_SCORES_API_URL) candidates.push(window.KBO_SCORES_API_URL);
  if (location.protocol !== 'file:') candidates.push('/api/kboScores');
  candidates.push('http://127.0.0.1:3000/api/kboScores');
  candidates.push('http://localhost:3000/api/kboScores');

  for (const url of candidates) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      return await r.json();
    } catch(e) {}
  }

  return await fetchTodayScoresDirect();
}

async function fetchTodayScores() {
  try {
    const data = await fetchScoresPayload();
    const games = data?.games || [];
    if (!games.length) return;

    let updated = false;
    games.forEach(g => {
      const idx = SCH.findIndex(s => s.date===g.date && s.away===g.away && s.home===g.home);
      if (idx === -1) return;
      const upd = {};
      if (g.status) upd.status = g.status;
      if (g.awayScore != null) upd.awayScore = g.awayScore;
      if (g.homeScore != null) upd.homeScore = g.homeScore;
      if (g.awayInnings?.some(x=>x>=0)) upd.awayInnings = g.awayInnings;
      if (g.homeInnings?.some(x=>x>=0)) upd.homeInnings = g.homeInnings;
      if (g.inning) upd.inning = g.inning;
      if (g.inningInfo) upd.inningInfo = g.inningInfo;
      if (g.winPitcher) upd.winPitcher = g.winPitcher;
      if (g.losePitcher) upd.losePitcher = g.losePitcher;
      if (g.awayStarter) upd.awayStarter = g.awayStarter;
      if (g.homeStarter) upd.homeStarter = g.homeStarter;
      if (g.awayPitcher) upd.awayPitcher = g.awayPitcher;
      if (g.homePitcher) upd.homePitcher = g.homePitcher;
      if (g.lineup) upd.lineup = g.lineup;
      if (g.currentGameState) upd.currentGameState = g.currentGameState;
      if (g.gameId) upd.gameId = g.gameId;
      if (g.broadChannel) upd.broadChannel = g.broadChannel;
      Object.assign(SCH[idx], upd);
      // FINAL?????localStorage????⑤???????      if (g.status === 'FINAL') {
        saveGameCache(g.date+'_'+g.away+'_'+g.home, upd);
      }
      updated = true;
    });

    if (updated) {
      render();
      if (state.modalGame) {
        const mg = SCH.find(s => s.date===state.modalGame.date && s.away===state.modalGame.away && s.home===state.modalGame.home);
        if (mg) { state.modalGame = mg; renderModal(D()); }
      }
    }
  } catch(e) {
    console.log('???노쭨???띠룄??????덉넮:', e.message);
  }
}
